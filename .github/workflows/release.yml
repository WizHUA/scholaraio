name: Release to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify release metadata alignment
        id: release_metadata
        run: python scripts/check_release_metadata.py

      - name: Install release dependencies
        run: pip install -e ".[dev,office]" build twine

      - name: Run release smoke tests
        run: pytest -q

      - name: Build package
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Publish to PyPI
        if: steps.release_metadata.outputs.is_prerelease != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
